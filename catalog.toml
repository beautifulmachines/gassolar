# catalog.toml — model registry for the gassolar collection
#
# Schema:
#   module — Python import path
#   class  — class name within that module
#
# All registered models must implement default() classmethod.
# Registration implies compliance: a model cannot appear here without a passing
# CI test via test_catalog.py.

[[models]]
module = "gassolar.gas.gas"
class = "Mission"

[[models]]
module = "gassolar.solar.solar"
class = "Mission"

[[models]]
module = "gassolar.solar_detailed.solar"
class = "Mission"

[[models]]
module = "gassolar.jho.jho"
class = "Mission"
