# Covers: gas aircraft (test_gas.py), solar aircraft (test_solar.py),
#         solar_detailed (test_solar_detailed.py), JHO (test_jho.py)
# STRUCT-04: gas and solar coverage. Liberty covered by liberty/ CI.
# UV_NO_SOURCES=1: intentional — uses published PyPI versions (gpkit-core, gpkit-models)
name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'  # nightly at 2 AM UTC

jobs:
  test:

    runs-on: ubuntu-latest
    env:
      UV_NO_SOURCES: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install
      run: uv sync --group test

    - name: Run tests
      run: |
        make test

    - name: Check for file changes
      run: |
        make check-clean
